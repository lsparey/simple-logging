syntax = "proto3";

package simplelog.v1;

option go_package = "github.com/lsparey/simple-logging/gen/simplelog/v1;simplelogv1";

// LogService exposes pod log data collected by simple-logging to frontend
// clients over gRPC-Web.
service LogService {
  // ListNamespaces returns all namespaces for which log files exist on disk.
  rpc ListNamespaces(ListNamespacesRequest) returns (ListNamespacesResponse);

  // ListPods returns all pods within a namespace for which log files exist,
  // along with whether each pod is currently being streamed (active).
  rpc ListPods(ListPodsRequest) returns (ListPodsResponse);

  // GetLogs returns a paginated, optionally time-filtered page of log lines
  // for a specific pod.
  rpc GetLogs(GetLogsRequest) returns (GetLogsResponse);

  // StreamLogs tails a pod's log file and streams new lines as they are
  // written. The stream stays open until the client cancels it.
  rpc StreamLogs(StreamLogsRequest) returns (stream StreamLogsResponse);

  // ListDeployments returns all deployments (groups of pods sharing the same
  // deployment name) within a namespace for which log files exist.
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);

  // GetDeploymentLogs returns a paginated, optionally time-filtered page of
  // log lines merged from all pods belonging to a deployment, sorted by time.
  rpc GetDeploymentLogs(GetDeploymentLogsRequest) returns (GetDeploymentLogsResponse);

  // StreamDeploymentLogs tails all active pods for a deployment and streams
  // merged log lines in real time. The stream stays open until the client
  // cancels it.
  rpc StreamDeploymentLogs(StreamDeploymentLogsRequest) returns (stream StreamDeploymentLogsResponse);

  // ListLogFiles returns every persisted pod log and index file with metadata.
  rpc ListLogFiles(ListLogFilesRequest) returns (ListLogFilesResponse);

  // ListIndexes returns all JSON log indexes configured on disk.
  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse);

  // CreateIndex creates a JSON key index and backfills it from existing pod logs.
  rpc CreateIndex(CreateIndexRequest) returns (CreateIndexResponse);

  // DeleteIndex removes a JSON key index and its persisted value files.
  rpc DeleteIndex(DeleteIndexRequest) returns (DeleteIndexResponse);

  // ListIndexValues returns observed values for an index ordered by match count.
  rpc ListIndexValues(ListIndexValuesRequest) returns (ListIndexValuesResponse);

  // GetIndexLogs returns log lines whose indexed JSON key matches the value.
  rpc GetIndexLogs(GetIndexLogsRequest) returns (GetIndexLogsResponse);
}

// ── ListNamespaces ────────────────────────────────────────────────────────────

message ListNamespacesRequest {}

message ListNamespacesResponse {
  repeated string namespaces = 1;
}

// ── ListPods ──────────────────────────────────────────────────────────────────

message ListPodsRequest {
  // namespace is required; use "*" is not supported — call ListNamespaces first.
  string namespace = 1;
}

message PodInfo {
  string name      = 1;
  string namespace = 2;
  // active is true when the pod is currently running and logs are being streamed.
  bool active = 3;
  // json_logging is true when the pod's log output appears to use JSON formatting.
  bool json_logging = 4;
}

message ListPodsResponse {
  repeated PodInfo pods = 1;
}

// ── GetLogs ───────────────────────────────────────────────────────────────────

message GetLogsRequest {
  string namespace = 1;
  string pod       = 2;

  // start_time and end_time are Unix timestamps (seconds).
  // A value of 0 means no bound on that side.
  int64 start_time = 3;
  int64 end_time   = 4;

  // page_size is the maximum number of log lines to return.
  // Defaults to 200 if unset or 0; capped at a server-defined maximum.
  int32 page_size = 5;

  // page_token is an opaque cursor returned by a previous GetLogs call.
  // Leave empty to start from the beginning (or the earliest line matching
  // the time filter).
  string page_token = 6;

  // load_last_page, when true, returns the last page of logs (most recent
  // lines) regardless of page_token. Use prev_page_token from the response
  // to page backwards through older logs.
  bool load_last_page = 7;
}

message GetLogsResponse {
  repeated string lines = 1;

  // next_page_token is the cursor to pass in the next request.
  // An empty value means this is the last page.
  string next_page_token = 2;

  // prev_page_token is the cursor to pass to load the page of older logs
  // that precedes this one. Empty when already at the beginning.
  string prev_page_token = 3;
}

// ── StreamLogs ────────────────────────────────────────────────────────────────

message StreamLogsRequest {
  string namespace = 1;
  string pod       = 2;
}

message StreamLogsResponse {
  string line = 1;
}

// ── ListDeployments ───────────────────────────────────────────────────────────

message ListDeploymentsRequest {
  string namespace = 1;
}

message DeploymentInfo {
  string name      = 1;
  string namespace = 2;
  // active is true when at least one pod in the deployment is currently running.
  bool active = 3;
  // json_logging is true when at least one pod in the deployment uses JSON log formatting.
  bool json_logging = 4;
}

message ListDeploymentsResponse {
  repeated DeploymentInfo deployments = 1;
}

// ── GetDeploymentLogs ─────────────────────────────────────────────────────────

message GetDeploymentLogsRequest {
  string namespace   = 1;
  string deployment  = 2;

  // start_time and end_time are Unix timestamps (seconds).
  // A value of 0 means no bound on that side.
  int64 start_time = 3;
  int64 end_time   = 4;

  // page_size is the maximum number of log lines to return.
  // Defaults to 200 if unset or 0; capped at a server-defined maximum.
  int32 page_size = 5;

  // page_token is an opaque cursor returned by a previous GetDeploymentLogs call.
  // Leave empty to start from the beginning.
  string page_token = 6;

  // load_last_page, when true, returns the last page of logs (most recent
  // lines) regardless of page_token. Use prev_page_token from the response
  // to page backwards through older logs.
  bool load_last_page = 7;
}

message GetDeploymentLogsResponse {
  repeated string lines = 1;

  // next_page_token is the cursor to pass in the next request.
  // An empty value means this is the last page.
  string next_page_token = 2;

  // prev_page_token is the cursor to pass to load the page of older logs
  // that precedes this one. Empty when already at the beginning.
  string prev_page_token = 3;
}

// ── StreamDeploymentLogs ──────────────────────────────────────────────────────

message StreamDeploymentLogsRequest {
  string namespace  = 1;
  string deployment = 2;
}

message StreamDeploymentLogsResponse {
  string line = 1;
}

// ── Log files ────────────────────────────────────────────────────────────────

message ListLogFilesRequest {}

message LogFileInfo {
  string namespace = 1;
  string name = 2;
  int64 size_bytes = 3;
  string kind = 4;
  int64 modified_at_unix_ms = 5;
}

message ListLogFilesResponse {
  repeated LogFileInfo files = 1;
  int64 total_size_bytes = 2;
}

// ── Indexes ──────────────────────────────────────────────────────────────────

message ListIndexesRequest {}

message LogIndexInfo {
  string key = 1;
}

message ListIndexesResponse {
  repeated LogIndexInfo indexes = 1;
}

message CreateIndexRequest {
  string key = 1;
}

message CreateIndexResponse {
  LogIndexInfo index = 1;
}

message DeleteIndexRequest {
  string key = 1;
}

message DeleteIndexResponse {}

message ListIndexValuesRequest {
  string key = 1;
}

message LogIndexValueInfo {
  string value = 1;
  int64 count = 2;
}

message ListIndexValuesResponse {
  repeated LogIndexValueInfo values = 1;
}

message GetIndexLogsRequest {
  string key = 1;
  string value = 2;

  // page_size is the maximum number of log lines to return.
  // Defaults to 200 if unset or 0; capped at a server-defined maximum.
  int32 page_size = 3;

  // page_token is an opaque cursor returned by a previous GetIndexLogs call.
  string page_token = 4;

  // load_last_page, when true, returns the last page of matching logs.
  bool load_last_page = 5;
}

message GetIndexLogsResponse {
  repeated string lines = 1;
  string next_page_token = 2;
  string prev_page_token = 3;
}
