name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3 — no v prefix)'
        required: true
        type: string

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # chart-releaser needs full git history

      - name: Compute version aliases
        id: ver
        run: |
          V="${{ inputs.version }}"
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "major_minor=${V%.*}" >> $GITHUB_OUTPUT

      - name: Update Chart.yaml
        run: |
          sed -i "s/^version:.*/version: ${{ steps.ver.outputs.version }}/" deploy/helm/simple-logging/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.ver.outputs.version }}\"/" deploy/helm/simple-logging/Chart.yaml

      - name: Commit and tag
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git add deploy/helm/simple-logging/Chart.yaml
          git commit -m "chore: release v${{ steps.ver.outputs.version }}"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            lsparey/simple-logging:${{ steps.ver.outputs.version }}
            lsparey/simple-logging:${{ steps.ver.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create gh-pages branch if it does not exist
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git switch --orphan gh-pages
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            git checkout "v${{ steps.ver.outputs.version }}"
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: deploy/helm
        env:
          CR_TOKEN: ${{ secrets.SIMPLE_LOGGING_ADMIN_BYPASS_TOKEN }}
