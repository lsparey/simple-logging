nameOverride: ""
fullnameOverride: ""

image:
  repository: simple-logging-ui
  tag: "latest"
  pullPolicy: IfNotPresent

# URL the browser uses to reach the gRPC-Web backend.
# When ingress.enabled=true and ingress.host is set, this is derived automatically
# as http://<ingress.host> so gRPC-Web traffic is proxied through the same origin.
# Set explicitly only when you need a different host or scheme.
grpcWebUrl: ""

# In-cluster routing of gRPC-Web calls through the Ingress.
# The pathPrefix matches the proto package path so Traefik can distinguish
# gRPC-Web requests from static asset requests on the same hostname.
backend:
  service: "simple-logging"
  port: 8080
  pathPrefix: "/simplelog.v1."

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  # host: ui.example.com
  host: ""
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101   # nginx UID in nginx:alpine
  runAsGroup: 101

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

# Extra environment variables to inject into the container.
extraEnv: []
