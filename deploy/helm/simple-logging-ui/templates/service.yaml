apiVersion: v1
kind: Service
metadata:
  name: {{ include "simple-logging-ui.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-logging-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "simple-logging-ui.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
