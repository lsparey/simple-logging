nameOverride: ""
fullnameOverride: ""

image:
  repository: lsparey/simple-logging
  tag: "latest"
  pullPolicy: IfNotPresent

# URL the browser uses to reach the gRPC-Web backend.
# When ingress.enabled=true and ingress.host is set this is derived automatically
# as http://<host>. Set explicitly only when you need a different host or scheme.
grpcWebUrl: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  # host: logging.example.com
  host: ""
  tls: []
  # Path prefix used to route gRPC-Web calls to port 8080 (must precede / catch-all).
  grpcPathPrefix: "/simplelog.v1."

# Application configuration — all values map 1:1 to environment variables.
config:
  logsRoot: /var/pod-logs
  grpcWebPort: 8080
  retentionDays: 30
  retentionCheckInterval: "24h"
  logLevel: info

# Persistent storage for log files.
persistence:
  enabled: true
  # storageClass: "" uses the cluster default. Set to a specific class if needed.
  storageClass: ""
  size: 20Gi
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  httpPort: 80      # nginx frontend
  grpcWebPort: 8080 # gRPC-Web backend

resources:
  requests:
    cpu: 150m
    memory: 160Mi
  limits:
    cpu: 700m
    memory: 576Mi

# Pod-level security context.
# The combined image uses nginx:alpine which starts as root to bind port 80.
podSecurityContext: {}

serviceAccount:
  # Set to false to use an existing service account.
  create: true
  # Leave blank to default to the chart fullname.
  name: ""

# RBAC — creates a ClusterRole + ClusterRoleBinding so the app can read pod logs
# across all namespaces. Disable if you manage RBAC externally.
rbac:
  create: true

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

# Extra environment variables to inject into the container.
# e.g. extraEnv:
#   - name: REST_DEBUG
#     value: "true"
extraEnv: []

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 30
