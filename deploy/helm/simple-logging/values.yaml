nameOverride: ""
fullnameOverride: ""

image:
  repository: lsparey/simple-logging
  tag: "latest"
  pullPolicy: IfNotPresent

# URL the browser uses to reach the gRPC-Web backend.
# With an ingress host this is derived automatically (including TLS). Without
# ingress, leave blank to use the frontend's current browser origin. Set it
# explicitly only when the backend is exposed at a different origin.
grpcWebUrl: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  # host: logging.example.com
  host: ""
  tls: []
  # Path prefix used to route gRPC-Web calls to port 8080 (must precede / catch-all).
  grpcPathPrefix: "/simplelog.v1."

# Application configuration — all values map 1:1 to environment variables.
config:
  logsRoot: /var/pod-logs
  grpcWebPort: 8080
  retentionDays: 30
  retentionCheckInterval: "24h"
  logLevel: info
  # logCollectionMode controls how pod logs are collected.
  #
  #   fileTail — tail log files directly from the node filesystem via a
  #     hostPath volume. Bypasses the Kubernetes log API entirely (no
  #     persistent connections through kube-apiserver/kubelet/containerd).
  #     Recommended for single-node clusters. Requires nodeLogsRoot to be
  #     set to the host path where the runtime writes pod log files.
  #
  #   api — stream logs via the Kubernetes log API (one persistent HTTP
  #     connection per pod). Works on any cluster topology, including
  #     multi-node, without any host filesystem access. Required when
  #     simple-logging is deployed as a single Deployment on a multi-node
  #     cluster. Can cause elevated containerd/kubelet CPU on busy clusters.
  #
  logCollectionMode: fileTail

  # Path where the runtime writes pod log files on the host node.
  # Only used when logCollectionMode is "fileTail".
  # Standard value for containerd and Docker: /var/log/pods
  nodeLogsRoot: /var/log/pods

  # Path where Docker writes the actual log file content on the host.
  # Only needed when logCollectionMode is "fileTail" AND the runtime is
  # Docker (e.g. Docker Desktop) — /var/log/pods entries are symlinks into
  # this directory, so it must also be mounted for the symlinks to resolve.
  # Leave empty for containerd clusters.
  dockerLogsRoot: /var/lib/docker/containers

# Persistent storage for log files.
persistence:
  enabled: true
  # storageClass: "" uses the cluster default. Set to a specific class if needed.
  storageClass: ""
  size: 20Gi
  accessMode: ReadWriteOnce

service:
  type: ClusterIP
  httpPort: 80      # nginx frontend
  grpcWebPort: 8080 # gRPC-Web backend

resources:
  requests:
    cpu: 150m
    memory: 160Mi
  limits:
    cpu: 700m
    memory: 576Mi

# Pod-level security context.
# The combined image uses nginx:alpine which starts as root to bind port 80.
podSecurityContext: {}

serviceAccount:
  # Set to false to use an existing service account.
  create: true
  # Leave blank to default to the chart fullname.
  name: ""

# RBAC — creates a ClusterRole + ClusterRoleBinding so the app can read pod logs
# across all namespaces. Disable if you manage RBAC externally.
rbac:
  create: true

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 5
  periodSeconds: 10

# Extra environment variables to inject into the container.
# e.g. extraEnv:
#   - name: REST_DEBUG
#     value: "true"
extraEnv: []

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 30
