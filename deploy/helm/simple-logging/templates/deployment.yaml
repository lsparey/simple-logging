apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simple-logging.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-logging.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "simple-logging.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "simple-logging.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "simple-logging.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: grpc-web
              containerPort: {{ .Values.config.grpcWebPort }}
              protocol: TCP
          env:
            - name: GRPC_WEB_URL
              {{- if .Values.grpcWebUrl }}
              value: {{ .Values.grpcWebUrl | quote }}
              {{- else if and .Values.ingress.enabled .Values.ingress.host }}
              value: {{ printf "http://%s" .Values.ingress.host | quote }}
              {{- else }}
              value: "http://localhost:8080"
              {{- end }}
            - name: LOGS_ROOT
              value: {{ .Values.config.logsRoot | quote }}
            - name: GRPC_WEB_PORT
              value: {{ .Values.config.grpcWebPort | quote }}
            - name: RETENTION_DAYS
              value: {{ .Values.config.retentionDays | quote }}
            - name: RETENTION_CHECK_INTERVAL
              value: {{ .Values.config.retentionCheckInterval | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: logs
              mountPath: {{ .Values.config.logsRoot }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: logs
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "simple-logging.fullname" . }}-logs
          {{- else }}
          emptyDir: {}
          {{- end }}
