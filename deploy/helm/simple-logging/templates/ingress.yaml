{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "simple-logging.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "simple-logging.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - {{- if .Values.ingress.host }}
      host: {{ .Values.ingress.host | quote }}
      {{- end }}
      http:
        paths:
          # Route gRPC-Web calls to the backend — must come before the / catch-all.
          - path: {{ .Values.ingress.grpcPathPrefix }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "simple-logging.fullname" . }}
                port:
                  name: grpc-web
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "simple-logging.fullname" . }}
                port:
                  name: http
{{- end }}
