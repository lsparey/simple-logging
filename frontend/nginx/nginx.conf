server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent config.js from being cached so env changes take effect on pod restart.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
