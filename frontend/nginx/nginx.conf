server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Keep browser gRPC-Web calls same-origin. In the combined image nginx is
    # moved to port 80 and the Go backend continues listening on port 8080.
    # Requests arrive here when no separate grpcWebUrl or ingress is configured.
    location ^~ /simplelog.v1. {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Server-streaming RPCs must be forwarded as data arrives.
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
    }

    # SPA fallback — all unmatched paths serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent config.js from being cached so env changes take effect on pod restart.
    location = /config.js {
        add_header Cache-Control "no-store";
    }
}
